name: Build release

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Release-Build"
        default: "Generate release build"
      version_name:
        description: 'Version name (i.e: 0.1-alpha)'
        required: true

jobs:
  build-release:
    name: Build release apk
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      #
      #      - name: Get versionCode
      #        run: |
      #          echo "Fetching versionCode..."
      #          version_code=${{ vars.VERSION_CODE }}
      #          echo "versionCode: $version_code"
      #          echo "version_code=$version_code" >> $GITHUB_ENV
      #
      #      - name: Set versionName and versionCode for the project
      #        run: |
      #          echo "versionName=${{ github.event.inputs.version_name }}" >> gradle.properties
      #          echo "versionCode=$version_code" >> gradle.properties
      #
      - name: Just get VERSION_CODE
        run: echo "version code = ${{ vars.VERSION_CODE }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version Code for the next project
        run: |
               version_code=${{ vars.VERSION_CODE }}
               gh variable set VERSION_CODE --body "version_code + 1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $SIGNING_KEY > keystore-b64.txt
          base64 -d keystore-b64.txt > keystore.jks

      - name: Build release APK/AAB
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_versionCode: ${{ vars.VERSION_CODE }}
          ORG_GRADLE_PROJECT_versionName: ${{ github.event.inputs.version_name }}
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Upload the release build
        uses: actions/upload-artifact@v4
        with:
          name: tsa-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  publish-github:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
      - name: Download release files
        uses: actions/download-artifact@v4
        with:
          name: tsa-release

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.version_name }}
          artifacts: "apk/release/app-release.apk,bundle/release/app-release.aab"
          makeLatest: true
          generateReleaseNotes: true