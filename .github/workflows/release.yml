name: Build release

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Release-Build"
        default: "Generate release build"
      version_name:
        description: 'Version name (i.e: 1.2.3)'
        required: true

jobs:
  build-release:
    name: Build release apk
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Get previous version code
        run: |
          echo "Fetching previous versionCode..."
          prev_version_code=$(gh variable get VERSION_CODE --jq '.value' || echo "0")
          echo "Previous versionCode: $prev_version_code"
          echo "prev_version_code=$prev_version_code" >> $GITHUB_ENV

      - name: Compute current version code
        id: compute_version_code
        run: |
          curr_version_code=$((prev_version_code + 1))
          echo "Current versionCode: $curr_version_code"
          echo "curr_version_code=$curr_version_code" >> $GITHUB_OUTPUT

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set versionName and versionCode for the project
        run: |
          ORG_GRADLE_PROJECT_versionName: ${{ github.event.inputs.versionName }}
          ORG_GRADLE_PROJECT_versionCode: $NEW_VERSION_CODE

      - name: Prepare keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $SIGNING_KEY > keystore-b64.txt
          base64 -d keystore-b64.txt > keystore.jks

      - name: Build release APK/AAB
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Upload the release build
        uses: actions/upload-artifact@v4
        with:
          name: tsa-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  publish-github:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
      - name: Download release files
        uses: actions/download-artifact@v4
        with:
          name: tsa-release

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.compute_version_code.outputs.curr_version_code }}
          artifacts: "apk/release/app-release.apk,bundle/release/app-release.aab"
          makeLatest: true
          generateReleaseNotes: true